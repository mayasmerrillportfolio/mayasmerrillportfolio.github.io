<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Sketching — Maya Merrill</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#111;--white:#fff;--gray:#f4f3f0;--mid:#888;--line:rgba(0,0,0,0.1);
  --serif:'Playfair Display',serif;--sans:'Inter',sans-serif;
}
body{font-family:var(--sans);background:var(--white);color:var(--black);overflow-x:hidden;padding-left:2rem;padding-right:2rem}

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:1.2rem 2.5rem;background:var(--white);
  border-bottom:1px solid var(--line);
}
.nav-back{font-size:12px;font-weight:500;color:var(--mid);text-decoration:none;letter-spacing:0.07em;text-transform:uppercase;transition:color 0.2s;display:flex;align-items:center;gap:0.5rem}
.nav-back:hover{color:var(--black)}
.nav-name{font-family:var(--serif);font-size:1.1rem;font-weight:700;color:var(--black);text-decoration:none}

/* ── GALLERY ── */
.gallery-item{overflow:hidden;cursor:pointer;background:var(--white)}
.gallery-item img{
  width:100%;display:block;
  opacity:0;
  transition:opacity 0.9s ease, transform 0.5s ease;
}
.gallery-item:hover img,.gallery-item img.revealed{opacity:1}
.gallery-item:hover img{transform:scale(1.02)}

/* ── FOOTER ── */
footer{padding:2rem 2.5rem;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
footer p{font-size:12px;color:var(--mid)}

/* ── RESPONSIVE ── */
@media(max-width:750px){
  nav{padding:1rem 1.25rem}
  footer{flex-direction:column;gap:0.5rem;text-align:center;padding:1.5rem 1.25rem}
}
</style>
</head>
<body>

<nav>
  <a class="nav-back" href="portfolio.html">← Back</a>
  <a class="nav-name" href="portfolio.html">Maya Merrill</a>
</nav>

<header style="padding:8rem 2.5rem 2rem;max-width:100%">
  <p style="font-size:11px;letter-spacing:0.15em;text-transform:uppercase;color:var(--mid);margin-bottom:1rem">Analog</p>
  <h1 style="font-family:var(--serif);font-size:clamp(2rem,5vw,4rem);font-weight:400;line-height:1.05;letter-spacing:-0.03em;margin-bottom:1.5rem">Product<br><em style="font-style:italic;color:var(--mid)">Sketching</em></h1>
  <p style="font-size:14px;font-weight:300;line-height:1.85;color:#555">Concept sketches made with COPIC markers and Micron pens.</p>
</header>

<div style="padding:2rem 2.5rem 6rem">
  <!-- Row 1: 1, 2, 3 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-top:0.6rem">
    <div class="gallery-item"><img src="sketch-1.jpg" alt="Sketch 1" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-2.jpg" alt="Sketch 2" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-3.jpg" alt="Sketch 3" style="width:100%;display:block"></div>
  </div>
  <!-- Row 2: sketch8, sketch9 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-top:0.6rem">
    <div class="gallery-item"><img src="sketch-8.jpg" alt="Sketch 8" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-9.jpg" alt="Sketch 9" style="width:100%;display:block"></div>
  </div>
  <!-- Row 3: sketch2-1, sketch2, sketch2-2 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-top:0.6rem">
    <div class="gallery-item"><img src="sketch-sketch2-1.jpg" alt="Sketch 2-1" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-sketch2.jpg" alt="Sketch 2" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-sketch2-2.jpg" alt="Sketch 2-2" style="width:100%;display:block"></div>
  </div>
  <!-- Row 3: sketch1, sketch1-1, sketch4 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-top:0.6rem">
    <div class="gallery-item"><img src="sketch-sketch1.jpg" alt="Sketch 1" style="width:100%;display:block;transform:scale(0.88);transform-origin:center"></div>
    <div class="gallery-item"><img src="sketch-sketch1-1.jpg" alt="Sketch 1-1" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-4.jpg" alt="Sketch 4" style="width:100%;display:block"></div>
  </div>
  <!-- Row 4: sketch5, sketch6, sketch7 -->
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.6rem;margin-top:0.6rem">
    <div class="gallery-item"><img src="sketch-5.jpg" alt="Sketch 5" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-6.jpg" alt="Sketch 6" style="width:100%;display:block"></div>
    <div class="gallery-item"><img src="sketch-7.jpg" alt="Sketch 7" style="width:100%;display:block"></div>
  </div>
</div>

<footer>
  <p>© 2026 Maya Merrill</p>
  <p><a href="portfolio.html" style="color:var(--mid);text-decoration:none;font-size:12px;letter-spacing:0.08em;text-transform:uppercase">Back to portfolio →</a></p>
</footer>

<script>
const _items = document.querySelectorAll('.gallery-item');
const _observer = new IntersectionObserver((entries) => {
  const visible = entries.filter(e => e.isIntersecting);
  visible.forEach((entry, i) => {
    const img = entry.target.querySelector('img');
    if(img && !img.classList.contains('revealed')){
      setTimeout(() => img.classList.add('revealed'), i * 600);
    }
    _observer.unobserve(entry.target);
  });
}, {threshold:0.1});
_items.forEach(item => {
  _observer.observe(item);
  item.addEventListener('mouseenter', () => {
    const img = item.querySelector('img');
    if(img) img.classList.add('revealed');
  }, {once:true});
});
</script>
</body>
</html>
